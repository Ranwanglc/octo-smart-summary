version: "3.8"

services:
  summary-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8080:8080"
    environment: &shared-env
      MYSQL_DSN: "root:tsdd123456@tcp(mysql:3306)/dmwork_summary?charset=utf8mb4&parseTime=True&loc=Local"
      IM_MYSQL_DSN: "root:tsdd123456@tcp(mysql:3306)/im?charset=utf8mb4&parseTime=True&loc=Local"
      REDIS_ADDR: "redis:6379"
      REDIS_DB: "0"
      LLM_API_URL: "${LLM_API_URL:-https://api.example.com/v1}"
      LLM_API_KEY: "${LLM_API_KEY:-}"
      LLM_MODEL: "${LLM_MODEL:-claude-opus-4-6}"
      OCTO_API_URL: "http://tangsengdaodaoserver:8090"
      OCTO_BOT_TOKEN: "${OCTO_BOT_TOKEN:-}"
    restart: unless-stopped

  summary-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      <<: *shared-env
      WORKER_MAX_CONCURRENT_TASKS: "20"
      WORKER_MAP_CONCURRENCY: "5"
      WORKER_POLL_INTERVAL_SECONDS: "2"
      WORKER_TASK_LEASE_MINUTES: "10"
      WORKER_MAX_RETRY: "3"
      WORKER_API_CALLBACK_URL: "http://summary-api:8081/internal/task-event"
    restart: unless-stopped
